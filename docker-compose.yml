services:
  app:
    build: .
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ENVIRONMENT=production
      - MONGO_URI=mongodb://mongo:27017/newsroom
      - REDIS_URI=redis://redis:6379
      - LOG_LEVEL=info
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data: